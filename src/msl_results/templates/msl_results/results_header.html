{% load wagtailcore_tags util_tags template_filters %}

<div class="card-header bg-gradient-primary py-3">
    <h5 class="card-title mb-0">{{ page.title }}</h5>
</div>
<!-- Form section outside of card-body -->
<div class="bg-light py-2 border-bottom d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-2">
    <div class="ps-3">
        <small class="text-muted">Pro detail výsledků vyberte kolo z hlavičky tabulky.</small>
    </div>
    <div class="px-3 pb-2 pb-md-0">
        <form method="get" action="" class="d-flex flex-wrap align-items-center gap-2">
            <div class="d-flex align-items-center gap-1">
                <label for="season_year" class="form-label mb-0 small text-muted text-nowrap">Sezóna:</label>
                <select class="form-select form-select-sm" id="season_year" name="season_year" onchange="this.form.submit()" aria-label="Select year">
                {% get_season_params_years as season_years %}
                {% for year in season_years %}
                    <option value="{{ year }}" {% if request.GET.season_year == year|stringformat:"s" %}selected{% endif %}>{{ year }}</option>
                {% endfor %}
                </select>
            </div>
            <div class="d-flex align-items-center gap-1">
                <label for="category" class="form-label mb-0 small text-muted text-nowrap">Kategorie:</label>
                <select class="form-select form-select-sm" id="category" name="category" onchange="this.form.submit()" aria-label="Select category">
                {% get_categories as categories %}
                {% for category_value, category_label in categories %}
                    <option value="{{ category_value }}" {% if request.GET.category == category_value %} selected {% endif %}>{{ category_label }}</option>
                {% endfor %}
                </select>
            </div>
            <div class="btn-group" role="group" aria-label="Zobrazení součtu">
                <input type="radio"
                       class="btn-check"
                       name="metric"
                       id="metricPoints"
                       value="points"
                       autocomplete="off"
                       onchange="this.form.submit()"
                       {% if display_total_metric != 'prize_money' %}checked{% endif %}>
                <label class="btn btn-outline-secondary btn-sm" for="metricPoints">
                    Body
                </label>

                <input type="radio"
                       class="btn-check"
                       name="metric"
                       id="metricMoney"
                       value="prize_money"
                       autocomplete="off"
                       onchange="this.form.submit()"
                       {% if display_total_metric == 'prize_money' %}checked{% endif %}>
                <label class="btn btn-outline-secondary btn-sm" for="metricMoney">
                    Kč
                </label>
            </div>
        </form>
    </div>
</div>
